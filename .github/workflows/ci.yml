name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        h2plant_hardened: [0, 1]
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up JDK 17
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'
        
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install cython pytest
        
    - name: Build Cython Extension
      run: |
        cythonize -i physical_engine/optimization/_numba_ops_core.pyx
        
    - name: Run Python tests
      env:
        H2PLANT_HARDENED: ${{ matrix.h2plant_hardened }}
      run: |
        pytest physical_engine/
        
    - name: Run Java tests
      run: |
        ./gradlew test
