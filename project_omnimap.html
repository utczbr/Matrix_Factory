<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project OmniMap - Architecture Visualization</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');

        body {
            font-family: 'Inter', sans-serif;
            background-color: #0B0F19; /* Deep space background */
            color: #E2E8F0;
            overflow: hidden;
            margin: 0;
            padding: 0;
        }

        #graph-container {
            width: 100vw;
            height: 100vh;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }

        /* SVG Element Styling */
        .node-circle {
            stroke: #fff;
            stroke-width: 1.5px;
            cursor: pointer;
            transition: stroke-width 0.2s, filter 0.2s;
        }

        .node-circle:hover {
            stroke-width: 3px;
            filter: drop-shadow(0 0 8px rgba(255, 255, 255, 0.8));
        }

        .node-label {
            font-size: 10px;
            font-weight: 600;
            fill: #E2E8F0;
            pointer-events: none;
            text-shadow: 0px 1px 3px rgba(0,0,0,0.8);
        }

        .link {
            stroke-opacity: 0.4;
            transition: stroke-opacity 0.2s, stroke-width 0.2s;
        }

        /* Tooltip */
        #tooltip {
            position: absolute;
            background: rgba(15, 23, 42, 0.9);
            border: 1px solid rgba(56, 189, 248, 0.3);
            backdrop-filter: blur(8px);
            color: white;
            padding: 12px 16px;
            border-radius: 8px;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.2s, transform 0.1s;
            z-index: 50;
            max-width: 250px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.5);
        }

        /* UI Overlay Layering */
        .ui-layer {
            position: relative;
            z-index: 10;
            pointer-events: none; /* Let clicks pass through empty space */
        }
        
        .ui-element {
            pointer-events: auto; /* Re-enable clicks for actual UI elements */
        }
        
        /* Custom Scrollbar for Legend */
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: rgba(15, 23, 42, 0.5); 
        }
        ::-webkit-scrollbar-thumb {
            background: rgba(56, 189, 248, 0.5); 
            border-radius: 10px;
        }
    </style>
</head>
<body class="antialiased">

    <!-- Tooltip Element -->
    <div id="tooltip">
        <h3 id="tt-title" class="font-bold text-sm text-sky-400 mb-1">Node Title</h3>
        <p id="tt-type" class="text-xs text-slate-400 uppercase tracking-wider mb-2">Category</p>
        <p id="tt-desc" class="text-xs text-slate-200 leading-relaxed">Description goes here.</p>
    </div>

    <!-- UI Overlay -->
    <div class="ui-layer flex flex-col h-screen justify-between p-6 w-full absolute inset-0">
        
        <!-- Header -->
        <header class="ui-element flex justify-end items-start">
            <!-- Controls -->
            <div class="ui-element flex gap-2 bg-slate-900/80 backdrop-blur-md border border-slate-700/50 p-2 rounded-lg shadow-xl">
                <button id="zoom-in" class="p-2 hover:bg-slate-700 rounded text-slate-300 transition-colors" title="Zoom In">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0zM10 7v3m0 0v3m0-3h3m-3 0H7"></path></svg>
                </button>
                <button id="zoom-out" class="p-2 hover:bg-slate-700 rounded text-slate-300 transition-colors" title="Zoom Out">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0zM13 10H7"></path></svg>
                </button>
                <div class="w-px bg-slate-700 mx-1 my-1"></div>
                <button id="reset-view" class="p-2 hover:bg-slate-700 rounded text-slate-300 transition-colors" title="Reset View">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>
                </button>
            </div>
        </header>

        <!-- Legend -->
        <div class="ui-element bg-slate-900/80 backdrop-blur-md border border-slate-700/50 p-4 rounded-xl shadow-2xl w-48 mt-auto mb-4 self-end">
            <h3 class="text-xs font-bold text-slate-300 uppercase tracking-wider mb-3 border-b border-slate-700 pb-2">Component Types</h3>
            <div id="legend-container" class="flex flex-col gap-2 text-sm">
                <!-- Injected via JS -->
            </div>
        </div>
    </div>

    <!-- D3 Container -->
    <div id="graph-container"></div>

    <script>
        // Comprehensive dataset representing the parsed SQLite nodes and edges
        const graphData = {
            nodes: [
                // 0: Python Core & Opt
                { id: "lut_manager.py", group: 0, radius: 18, desc: "Look-Up Table manager for thermodynamics" },
                { id: "numba_ops.py", group: 0, radius: 15, desc: "JIT compiled numerical operations" },
                { id: "mixture_thermodynamics.py", group: 0, radius: 14, desc: "Thermodynamic calculations for mixtures" },
                { id: "coolprop_lut.py", group: 0, radius: 12, desc: "CoolProp integration for LUTs" },
                { id: "core/component.py", group: 0, radius: 12, desc: "Base component class" },
                { id: "_numba_ops_core_python.py", group: 0, radius: 12, desc: "Core Python fallback for Numba ops" },
                { id: "core/constants.py", group: 0, radius: 10, desc: "System-wide constants" },

                // 1: Python Factory Sim
                { id: "pemfc_model.py", group: 1, radius: 16, desc: "PEM Fuel Cell physical model" },
                { id: "chiller.py", group: 1, radius: 12, desc: "Chiller physical model" },
                { id: "compressor.py", group: 1, radius: 12, desc: "Compressor physical model" },
                { id: "h2_tank.py", group: 1, radius: 12, desc: "Hydrogen tank physical model" },
                { id: "station_stochastics.py", group: 1, radius: 10, desc: "Station stochastic behaviors" },
                { id: "stack_thermal_model.py", group: 1, radius: 12, desc: "Thermal model for the stack" },

                // 2: Java CArtAgO Artifacts
                { id: "MainSimulator.java", group: 2, radius: 25, desc: "Main entry point for Java simulation" },
                { id: "AMRArtifact.java", group: 2, radius: 16, desc: "CArtAgO artifact for AMR management" },
                { id: "BaseStationArtifact.java", group: 2, radius: 16, desc: "CArtAgO artifact for stations" },
                { id: "DatabaseArtifact.java", group: 2, radius: 16, desc: "SQLite database recording artifact" },
                { id: "EnergyPriceArtifact.java", group: 2, radius: 14, desc: "Energy price simulator artifact" },
                { id: "TimerArtifact.java", group: 2, radius: 14, desc: "Simulation timer artifact" },
                { id: "SupervisorArtifact.java", group: 2, radius: 16, desc: "Factory supervisor artifact" },
                { id: "TelemetryArtifact.java", group: 2, radius: 15, desc: "Telemetry collection artifact" },
                { id: "UtilitySystemArtifact.java", group: 2, radius: 15, desc: "Utility system artifact" },

                // 3: Java Infra & Tests
                { id: "TelemetryHub.java", group: 3, radius: 14, desc: "Hub for WebSocket telemetry" },
                { id: "TelemetryWebSocketEndpoint.java", group: 3, radius: 14, desc: "WebSocket endpoint for UI" },
                { id: "TicketIssuer.java", group: 3, radius: 10, desc: "Authentication ticket issuer" },
                { id: "TicketAuthConfigurator.java", group: 3, radius: 10, desc: "Auth configurator" },
                { id: "TicketHttpServer.java", group: 3, radius: 10, desc: "HTTP server for tickets" },
                { id: "SimulationTestHarness.java", group: 3, radius: 18, desc: "Test harness for simulations" },
                { id: "InvariantTests.java", group: 3, radius: 12, desc: "Invariant property tests" },
                { id: "SeededReplayTests.java", group: 3, radius: 12, desc: "Seeded replay simulation tests" },

                // 4: Scripts & UI
                { id: "run_prosa_vs_adacor.py", group: 4, radius: 16, desc: "Experiment runner script" },
                { id: "analyze_results.py", group: 4, radius: 14, desc: "Results analysis script" },
                { id: "dashboard.js", group: 4, radius: 18, desc: "Frontend visualization dashboard" },

                // 5: RPC Bridge Layer
                { id: "sim_bridge_server.py", group: 5, radius: 20, desc: "gRPC server bridging Java and Python" },
                { id: "GrpcClientBridge.java", group: 5, radius: 18, desc: "gRPC client connecting to Python server" },
                { id: "sim_bridge_pb2", group: 5, radius: 12, desc: "Protobuf generated classes" }
            ],
            links: [
                { source: "MainSimulator.java", target: "AMRArtifact.java", value: 3 },
                { source: "MainSimulator.java", target: "BaseStationArtifact.java", value: 3 },
                { source: "MainSimulator.java", target: "DatabaseArtifact.java", value: 3 },
                { source: "MainSimulator.java", target: "EnergyPriceArtifact.java", value: 2 },
                { source: "MainSimulator.java", target: "TimerArtifact.java", value: 2 },
                { source: "MainSimulator.java", target: "SupervisorArtifact.java", value: 2 },
                { source: "MainSimulator.java", target: "TelemetryArtifact.java", value: 2 },
                { source: "MainSimulator.java", target: "UtilitySystemArtifact.java", value: 2 },
                { source: "MainSimulator.java", target: "GrpcClientBridge.java", value: 4 },

                { source: "GrpcClientBridge.java", target: "sim_bridge_pb2", value: 3 },
                { source: "sim_bridge_server.py", target: "sim_bridge_pb2", value: 3 },

                { source: "sim_bridge_server.py", target: "pemfc_model.py", value: 3 },
                { source: "sim_bridge_server.py", target: "chiller.py", value: 2 },
                { source: "sim_bridge_server.py", target: "compressor.py", value: 2 },
                { source: "sim_bridge_server.py", target: "h2_tank.py", value: 2 },
                { source: "sim_bridge_server.py", target: "lut_manager.py", value: 4 },

                { source: "pemfc_model.py", target: "numba_ops.py", value: 4 },
                { source: "pemfc_model.py", target: "stack_thermal_model.py", value: 2 },
                { source: "lut_manager.py", target: "mixture_thermodynamics.py", value: 3 },
                { source: "lut_manager.py", target: "coolprop_lut.py", value: 2 },
                { source: "lut_manager.py", target: "numba_ops.py", value: 3 },
                { source: "mixture_thermodynamics.py", target: "numba_ops.py", value: 3 },
                { source: "numba_ops.py", target: "_numba_ops_core_python.py", value: 2 },

                { source: "pemfc_model.py", target: "core/component.py", value: 1 },
                { source: "chiller.py", target: "core/component.py", value: 1 },
                { source: "compressor.py", target: "core/component.py", value: 1 },
                { source: "h2_tank.py", target: "core/component.py", value: 1 },
                { source: "core/component.py", target: "core/constants.py", value: 1 },

                { source: "TelemetryArtifact.java", target: "TelemetryHub.java", value: 3 },
                { source: "TelemetryWebSocketEndpoint.java", target: "TelemetryHub.java", value: 3 },
                { source: "TicketHttpServer.java", target: "TicketIssuer.java", value: 2 },
                { source: "TicketAuthConfigurator.java", target: "TicketIssuer.java", value: 2 },
                { source: "TelemetryWebSocketEndpoint.java", target: "TicketAuthConfigurator.java", value: 2 },

                { source: "dashboard.js", target: "TelemetryWebSocketEndpoint.java", value: 2 },

                { source: "SimulationTestHarness.java", target: "MainSimulator.java", value: 4 },
                { source: "InvariantTests.java", target: "SimulationTestHarness.java", value: 2 },
                { source: "SeededReplayTests.java", target: "SimulationTestHarness.java", value: 2 },

                { source: "run_prosa_vs_adacor.py", target: "MainSimulator.java", value: 2 },
                { source: "analyze_results.py", target: "DatabaseArtifact.java", value: 2 },
                { source: "BaseStationArtifact.java", target: "station_stochastics.py", value: 1 }
            ]
        };

        // Configuration mapped to tailwind-like colors for a cyber aesthetic
        const groupConfig = {
            0: { name: "Python Core & Opt", color: "#38BDF8" }, // Sky
            1: { name: "Python Factory Sim", color: "#34D399" }, // Emerald
            2: { name: "Java CArtAgO Artifacts", color: "#F472B6" }, // Pink
            3: { name: "Java Infra & Tests", color: "#818CF8" }, // Indigo
            4: { name: "Scripts & UI", color: "#FBBF24" },  // Amber
            5: { name: "RPC Bridge Layer", color: "#F8FAFC" } // White
        };

        // Render Legend
        const legendContainer = document.getElementById('legend-container');
        Object.values(groupConfig).forEach(config => {
            legendContainer.innerHTML += `
                <div class="flex items-center gap-2">
                    <div class="w-3 h-3 rounded-full" style="background-color: ${config.color}; box-shadow: 0 0 8px ${config.color}"></div>
                    <span class="text-slate-200">${config.name}</span>
                </div>
            `;
        });

        const container = document.getElementById('graph-container');
        let width = container.clientWidth;
        let height = container.clientHeight;

        const svg = d3.select("#graph-container")
            .append("svg")
            .attr("width", width)
            .attr("height", height)
            .attr("viewBox", [0, 0, width, height])
            .attr("style", "max-width: 100%; height: auto;");

        // Add SVG Filters for Glow Effect
        const defs = svg.append("defs");
        const filter = defs.append("filter")
            .attr("id", "glow")
            .attr("x", "-20%")
            .attr("y", "-20%")
            .attr("width", "140%")
            .attr("height", "140%");
        filter.append("feGaussianBlur")
            .attr("stdDeviation", "3")
            .attr("result", "blur");
        const feMerge = filter.append("feMerge");
        feMerge.append("feMergeNode").attr("in", "blur");
        feMerge.append("feMergeNode").attr("in", "SourceGraphic");

        // Group for zooming
        const g = svg.append("g");

        // Force simulation
        const simulation = d3.forceSimulation(graphData.nodes)
            .force("link", d3.forceLink(graphData.links).id(d => d.id).distance(d => 100 - d.value * 10))
            .force("charge", d3.forceManyBody().strength(-300))
            .force("center", d3.forceCenter(width / 2, height / 2))
            .force("collide", d3.forceCollide().radius(d => d.radius + 15).iterations(2));

        // Draw Links
        const link = g.append("g")
            .attr("stroke", "#475569") // Slate-600
            .selectAll("line")
            .data(graphData.links)
            .join("line")
            .attr("class", "link")
            .attr("stroke-width", d => Math.sqrt(d.value) * 1.5);

        // Draw Nodes (Groups for circle + text)
        const node = g.append("g")
            .selectAll("g")
            .data(graphData.nodes)
            .join("g")
            .call(drag(simulation));

        // Node Circles
        node.append("circle")
            .attr("class", "node-circle")
            .attr("r", d => d.radius)
            .attr("fill", d => groupConfig[d.group].color)
            .style("filter", "url(#glow)");

        // Node Labels
        node.append("text")
            .attr("class", "node-label")
            .attr("x", d => d.radius + 6)
            .attr("y", 4)
            .text(d => d.id);

        // Pre-calculate connected nodes for hover effect
        const linkedByIndex = {};
        graphData.links.forEach(d => {
            linkedByIndex[`${d.source.id},${d.target.id}`] = 1;
            linkedByIndex[`${d.target.id},${d.source.id}`] = 1;
        });

        function isConnected(a, b) {
            return linkedByIndex[`${a.id},${b.id}`] || linkedByIndex[`${b.id},${a.id}`] || a.id === b.id;
        }

        // Hover Interactivity
        const tooltip = document.getElementById('tooltip');
        const ttTitle = document.getElementById('tt-title');
        const ttType = document.getElementById('tt-type');
        const ttDesc = document.getElementById('tt-desc');

        node.on("mouseover", function(event, d) {
            // Fade out non-connected nodes and links
            node.transition().duration(200).style("opacity", o => isConnected(d, o) ? 1 : 0.1);
            link.transition().duration(200)
                .style("stroke-opacity", o => (o.source === d || o.target === d ? 0.8 : 0.05))
                .style("stroke", o => (o.source === d || o.target === d ? groupConfig[d.group].color : "#475569"));

            // Enlarge current node
            d3.select(this).select("circle").transition().duration(200).attr("r", d.radius * 1.2);

            // Show Tooltip
            ttTitle.innerText = d.id;
            ttTitle.style.color = groupConfig[d.group].color;
            ttType.innerText = groupConfig[d.group].name;
            ttDesc.innerText = d.desc;
            
            tooltip.style.opacity = 1;
            
            // Position tooltip
            const px = event.pageX + 20;
            const py = event.pageY + 20;
            
            // Prevent tooltip from going off-screen
            const ttRect = tooltip.getBoundingClientRect();
            const finalX = px + ttRect.width > window.innerWidth ? event.pageX - ttRect.width - 20 : px;
            const finalY = py + ttRect.height > window.innerHeight ? event.pageY - ttRect.height - 20 : py;

            tooltip.style.transform = `translate(${finalX}px, ${finalY}px)`;
            
        }).on("mousemove", function(event) {
            const px = event.pageX + 20;
            const py = event.pageY + 20;
            const ttRect = tooltip.getBoundingClientRect();
            const finalX = px + ttRect.width > window.innerWidth ? event.pageX - ttRect.width - 20 : px;
            const finalY = py + ttRect.height > window.innerHeight ? event.pageY - ttRect.height - 20 : py;
            tooltip.style.transform = `translate(${finalX}px, ${finalY}px)`;
            
        }).on("mouseout", function(event, d) {
            // Restore opacities
            node.transition().duration(300).style("opacity", 1);
            link.transition().duration(300)
                .style("stroke-opacity", 0.4)
                .style("stroke", "#475569");
                
            // Restore size
            d3.select(this).select("circle").transition().duration(300).attr("r", d.radius);

            // Hide Tooltip
            tooltip.style.opacity = 0;
        });

        // Simulation Tick
        simulation.on("tick", () => {
            link
                .attr("x1", d => d.source.x)
                .attr("y1", d => d.source.y)
                .attr("x2", d => d.target.x)
                .attr("y2", d => d.target.y);

            node.attr("transform", d => `translate(${d.x},${d.y})`);
        });

        // Drag Behavior
        function drag(simulation) {
            function dragstarted(event) {
                if (!event.active) simulation.alphaTarget(0.3).restart();
                event.subject.fx = event.subject.x;
                event.subject.fy = event.subject.y;
            }
            
            function dragged(event) {
                event.subject.fx = event.x;
                event.subject.fy = event.y;
            }
            
            function dragended(event) {
                if (!event.active) simulation.alphaTarget(0);
                event.subject.fx = null;
                event.subject.fy = null;
            }
            
            return d3.drag()
                .on("start", dragstarted)
                .on("drag", dragged)
                .on("end", dragended);
        }

        // Zoom Behavior
        const zoom = d3.zoom()
            .scaleExtent([0.1, 4])
            .on("zoom", (event) => {
                g.attr("transform", event.transform);
            });

        svg.call(zoom);

        // Control Buttons
        document.getElementById('zoom-in').addEventListener('click', () => {
            svg.transition().duration(300).call(zoom.scaleBy, 1.3);
        });
        
        document.getElementById('zoom-out').addEventListener('click', () => {
            svg.transition().duration(300).call(zoom.scaleBy, 0.7);
        });
        
        document.getElementById('reset-view').addEventListener('click', () => {
            svg.transition().duration(750).call(zoom.transform, d3.zoomIdentity);
            // Re-center physics
            simulation.force("center", d3.forceCenter(width / 2, height / 2));
            simulation.alpha(0.3).restart();
        });

        // Handle Window Resize
        window.addEventListener('resize', () => {
            width = container.clientWidth;
            height = container.clientHeight;
            svg.attr("width", width).attr("height", height).attr("viewBox", [0, 0, width, height]);
            simulation.force("center", d3.forceCenter(width / 2, height / 2));
            simulation.alpha(0.3).restart();
        });

    </script>
</body>
</html>
