<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Factory Twin Telemetry</title>
    <style>
        body {
            font-family: sans-serif;
            background: #222;
            color: #fff;
            margin: 0;
            padding: 20px;
        }

        #canvas-container {
            position: relative;
            width: 800px;
            height: 600px;
            background: #333;
            margin-top: 20px;
        }

        canvas {
            display: block;
        }

        .hud {
            margin-bottom: 10px;
        }
    </style>
    <!-- Basic protobuf decoding -->
    <script src="https://cdn.jsdelivr.net/npm/protobufjs@7.2.5/dist/protobuf.min.js"></script>
</head>

<body>
    <h1>Matrix Factory Telemetry (Phase 4)</h1>
    <div class="hud">
        <label for="runSelect">Run:</label>
        <select id="runSelect"></select>
        <span>Sim Time: <span id="simTime">0.00</span>s</span> |
        <span>Dropped Frames: <span id="droppedFrames">0</span></span>
    </div>
    <div id="canvas-container">
        <canvas id="factoryCanvas" width="800" height="600"></canvas>
    </div>

    <div id="station5Panel" style="margin-top:16px; padding:12px; background:#2a2a2a; border-radius:6px; max-width:800px; font-size:14px;">
        <h3 style="margin:0 0 8px 0;">Station 5 — PEMFC Test Bench</h3>
        <div id="station5Body">Waiting for telemetry…</div>
    </div>

    <!-- The compiled protobuf script will be needed in a real setup, but for Phase 3.5 we'll load the .proto dynamically or mock it if not available, since the doc just says "TelemetryFrame.decode". We'll try to load factory.proto if it exists or use a dynamic approach in dashboard.js -->
    <script src="dashboard.js?v=5"></script>
</body>

</html>
